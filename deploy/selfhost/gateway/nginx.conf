# Gateway — прокси для subdomain mode. Принимает от main Traefik, отдаёт server/web
server {
    listen 9080;
    server_name _;
    client_max_body_size 50M;

    location /api {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /.well-known { proxy_pass http://server:8080; proxy_set_header Host $host; }
    location /federation { proxy_pass http://server:8080; proxy_set_header Host $host; }
    location /health { proxy_pass http://server:8080; proxy_set_header Host $host; }

    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
