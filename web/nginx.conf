server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Боты/сканеры — отвечаем 204 без записи в error_log
    location = /okokcdn_monitor_node { return 204; access_log off; }
    location = /favicon.ico { return 204; access_log off; }
    location = /robots.txt { return 204; access_log off; }
    location = /sitemap.xml { return 204; access_log off; }
    location = /config.json { return 204; access_log off; }

    location /api {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /.well-known { proxy_pass http://server:8080; proxy_set_header Host $host; }
    location /federation { proxy_pass http://server:8080; proxy_set_header Host $host; }
    location /health { proxy_pass http://server:8080; proxy_set_header Host $host; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
